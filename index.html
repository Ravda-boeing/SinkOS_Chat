<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SinkOS Chat (Public beta) </title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --blur: 28px;
    --radius: 20px;
    --radius-sm: 14px;
    --font-display: 'Space Grotesk', 'Inter', sans-serif;
    --font-body: 'Inter', sans-serif;
  }
  html[data-theme="dark"] {
    --bg-0: #0b0d14;
    --orb-1: #4f6df5;
    --orb-2: #8b5cf6;
    --orb-3: #22d3ee;
    --glass: rgba(255,255,255,0.06);
    --glass-strong: rgba(255,255,255,0.10);
    --glass-border: rgba(255,255,255,0.14);
    --text: #f2f3f7;
    --text-dim: rgba(242,243,247,0.56);
    --text-faint: rgba(242,243,247,0.32);
    --accent: #7c9bff;
    --accent-strong: #a78bfa;
    --danger: #ff6b6b;
    --online: #4ade80;
    --shadow: 0 8px 32px rgba(0,0,0,0.45);
    --input-bg: rgba(255,255,255,0.05);
  }
  html[data-theme="light"] {
    --bg-0: #eef1f8;
    --orb-1: #a9c1ff;
    --orb-2: #cdb8ff;
    --orb-3: #a6e8f5;
    --glass: rgba(255,255,255,0.55);
    --glass-strong: rgba(255,255,255,0.72);
    --glass-border: rgba(255,255,255,0.9);
    --text: #14151c;
    --text-dim: rgba(20,21,28,0.58);
    --text-faint: rgba(20,21,28,0.34);
    --accent: #5b6ff0;
    --accent-strong: #8b5cf6;
    --danger: #e0435a;
    --online: #22c069;
    --shadow: 0 8px 32px rgba(80,90,140,0.18);
    --input-bg: rgba(255,255,255,0.5);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; font-family: var(--font-body); }
  body { background: var(--bg-0); color: var(--text); overflow: hidden; transition: background 0.4s ease, color 0.4s ease; }

  .orb { position: fixed; border-radius: 50%; filter: blur(90px); opacity: 0.55; z-index: 0; pointer-events: none; animation: drift 26s ease-in-out infinite alternate; }
  .orb1 { width: 480px; height: 480px; background: var(--orb-1); top: -140px; left: -100px; }
  .orb2 { width: 420px; height: 420px; background: var(--orb-2); bottom: -160px; right: -80px; animation-delay: -8s; }
  .orb3 { width: 360px; height: 360px; background: var(--orb-3); top: 40%; left: 60%; animation-delay: -16s; }
  @keyframes drift { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(40px,-30px) scale(1.08); } }
  @media (prefers-reduced-motion: reduce) { .orb { animation: none; } }

  .glass { background: var(--glass); backdrop-filter: blur(var(--blur)) saturate(160%); -webkit-backdrop-filter: blur(var(--blur)) saturate(160%); border: 1px solid var(--glass-border); box-shadow: var(--shadow); }

  #app { position: relative; z-index: 1; height: 100%; display: flex; align-items: center; justify-content: center; padding: 24px; }

  #authScreen { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; }
  .authBox { width: 340px; padding: 36px; border-radius: var(--radius); }
  .authBox h1 { font-family: var(--font-display); font-size: 20px; margin: 0 0 4px; font-weight: 700; background: linear-gradient(120deg, var(--accent), var(--accent-strong)); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .authBox p.sub { color: var(--text-dim); font-size: 12.5px; margin: 0 0 26px; }

  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 10.5px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 6px; font-weight: 600; }
  .field input { width: 100%; padding: 11px 14px; background: var(--input-bg); border: 1px solid var(--glass-border); border-radius: var(--radius-sm); color: var(--text); font-family: var(--font-body); font-size: 13.5px; transition: border-color 0.2s ease; }
  .field input::placeholder { color: var(--text-faint); }
  .field input:focus { outline: none; border-color: var(--accent); }

  button { font-family: var(--font-body); cursor: pointer; }
  button.primary { width: 100%; padding: 12px; border: none; border-radius: var(--radius-sm); background: linear-gradient(120deg, var(--accent), var(--accent-strong)); color: #fff; font-weight: 600; font-size: 13px; letter-spacing: 0.3px; margin-top: 6px; box-shadow: 0 6px 20px rgba(124,155,255,0.35); transition: transform 0.15s ease, box-shadow 0.15s ease; }
  button.primary:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(124,155,255,0.45); }
  button.primary:active { transform: translateY(0); }
  button.primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .authError { color: var(--danger); font-size: 11.5px; margin-top: 12px; min-height: 14px; }

  #mainScreen { display: none; width: 100%; height: 100%; max-width: 1080px; gap: 16px; }
  #mainScreen.active { display: flex; }

  #sidebar { width: 300px; min-width: 300px; border-radius: var(--radius); display: flex; flex-direction: column; overflow: hidden; }
  #sidebarHeader { padding: 18px 18px 14px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--glass-border); }
  #sidebarHeader .brand { font-family: var(--font-display); font-size: 14px; font-weight: 700; letter-spacing: 0.3px; }
  #sidebarHeader .me { font-size: 10.5px; color: var(--text-dim); margin-top: 3px; }

  #tabBar { display: flex; padding: 10px 14px 0; gap: 6px; }
  .tabBtn { flex: 1; padding: 8px 4px; background: none; border: none; border-radius: var(--radius-sm); color: var(--text-dim); font-size: 11.5px; font-weight: 600; position: relative; transition: background 0.2s ease, color 0.2s ease; }
  .tabBtn:hover { background: var(--glass); }
  .tabBtn.active { background: var(--glass-strong); color: var(--text); }
  .tabBadge { position: absolute; top: 3px; right: 10px; background: var(--danger); color: #fff; font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 10px; min-width: 14px; }

  .tabPanel { flex: 1; overflow-y: auto; padding: 10px 10px 14px; display: none; }
  .tabPanel.active { display: block; }

  .rowItem { display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: var(--radius-sm); cursor: pointer; margin-bottom: 4px; transition: background 0.15s ease; }
  .rowItem:hover { background: var(--glass); }
  .rowItem.active { background: var(--glass-strong); }
  .avatar { width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0; background: linear-gradient(135deg, var(--accent), var(--accent-strong)); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 13px; position: relative; }
  .presenceDot { position: absolute; width: 10px; height: 10px; border-radius: 50%; bottom: -1px; right: -1px; border: 2px solid var(--bg-0); background: var(--text-faint); }
  .presenceDot.online { background: var(--online); }
  .rowText { flex: 1; min-width: 0; }
  .rowText .name { font-size: 13px; font-weight: 600; }
  .rowText .preview { font-size: 11px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
  .rowMuted { color: var(--text-faint); font-size: 12px; padding: 16px 10px; text-align: center; }

  .reqActions { display: flex; gap: 6px; }
  .reqActions button { padding: 6px 10px; font-size: 11px; border-radius: 10px; cursor: pointer; border: none; font-family: var(--font-body); }
  .btnAccept { background: var(--online); color: #fff; font-weight: 600; }
  .btnDecline { background: transparent; color: var(--text-dim); border: 1px solid var(--glass-border) !important; }
  .btnDecline:hover { color: var(--danger); border-color: var(--danger) !important; }
  .pendingTag { font-size: 10.5px; color: var(--text-faint); font-style: italic; }

  #addFriendBar { padding: 8px 10px 4px; display: flex; gap: 6px; }
  #addFriendBar input { flex: 1; padding: 9px 12px; border-radius: var(--radius-sm); border: 1px solid var(--glass-border); background: var(--input-bg); color: var(--text); font-size: 12.5px; font-family: var(--font-body); }
  #addFriendBar input:focus { outline: none; border-color: var(--accent); }
  #addFriendBar button { padding: 0 14px; border-radius: var(--radius-sm); border: none; background: var(--accent); color: #fff; font-size: 12px; font-weight: 600; font-family: var(--font-body); }
  #addFriendMsg { font-size: 10.5px; padding: 4px 12px 0; min-height: 14px; }
  #addFriendMsg.error { color: var(--danger); }
  #addFriendMsg.success { color: var(--online); }

  #signOutBtn { padding: 12px 18px; background: none; border: none; border-top: 1px solid var(--glass-border); color: var(--text-faint); font-size: 10.5px; text-align: left; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; width: 100%; }
  #signOutBtn:hover { color: var(--danger); }

  #chatPane { flex: 1; border-radius: var(--radius); display: flex; flex-direction: column; overflow: hidden; }
  #chatHeader { padding: 16px 22px; border-bottom: 1px solid var(--glass-border); display: none; align-items: center; gap: 12px; }
  .chInfo .chTitle { font-size: 13.5px; font-weight: 600; }
  .chInfo .chStatus { font-size: 10.5px; color: var(--text-dim); margin-top: 2px; display: flex; align-items: center; gap: 5px; }
  .chStatusDot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-faint); display: inline-block; }
  .chStatusDot.online { background: var(--online); }

  #emptyState { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-faint); font-size: 12.5px; text-align: center; padding: 20px; gap: 6px; }
  #emptyState .big { font-family: var(--font-display); font-size: 16px; color: var(--text-dim); font-weight: 600; }

  #messages { flex: 1; overflow-y: auto; padding: 20px 22px; display: none; flex-direction: column; gap: 10px; }
  .msg { max-width: 62%; padding: 10px 14px; font-size: 13px; line-height: 1.45; border-radius: 16px; }
  .msg.mine { align-self: flex-end; color: #fff; border-bottom-right-radius: 4px; background: linear-gradient(120deg, var(--accent), var(--accent-strong)); }
  .msg.theirs { align-self: flex-start; border-bottom-left-radius: 4px; background: var(--glass-strong); border: 1px solid var(--glass-border); color: var(--text); }
  .msg .meta { font-size: 9px; opacity: 0.6; margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.8px; }

  #composer { display: none; padding: 14px; border-top: 1px solid var(--glass-border); gap: 10px; }
  #composer input { flex: 1; padding: 12px 16px; background: var(--input-bg); border: 1px solid var(--glass-border); border-radius: 999px; color: var(--text); font-size: 13px; font-family: var(--font-body); }
  #composer input:focus { outline: none; border-color: var(--accent); }
  #composer button { padding: 0 22px; border: none; border-radius: 999px; color: #fff; font-weight: 600; font-size: 12px; background: linear-gradient(120deg, var(--accent), var(--accent-strong)); font-family: var(--font-body); white-space: nowrap; }
  #composer button:disabled { opacity: 0.5; cursor: not-allowed; }

  .themeToggle { width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--glass-border); background: var(--glass); display: flex; align-items: center; justify-content: center; font-size: 15px; cursor: pointer; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div id="app">
  <div id="authScreen">
    <div class="authBox glass">
      <h1>Sink OS Chat</h1>
      <p class="sub">Sign in with your Sink OS account</p>
      <div class="field"><label>Email</label><input type="email" id="authEmail" placeholder="you@example.com" autocomplete="username"></div>
      <div class="field"><label>Password</label><input type="password" id="authPassword" placeholder="••••••••" autocomplete="current-password"></div>
      <button class="primary" id="signInBtn">Sign In</button>
      <div class="authError" id="authError"></div>
    </div>
  </div>

  <div id="mainScreen">
    <div id="sidebar" class="glass">
      <div id="sidebarHeader">
        <div>
          <div class="brand">Sink OS Chat</div>
          <div class="me" id="meLabel"></div>
        </div>
        <button class="themeToggle" id="themeToggleBtn" title="Toggle theme">🌙</button>
      </div>
      <div id="tabBar">
        <button class="tabBtn active" data-tab="chats">Chats</button>
        <button class="tabBtn" data-tab="friends">Friends</button>
        <button class="tabBtn" data-tab="requests">Requests<span class="tabBadge" id="reqBadge" style="display:none;">0</span></button>
      </div>
      <div id="tabPanels" style="flex:1; overflow:hidden; display:flex; flex-direction:column;">
        <div class="tabPanel active" id="panel-chats"></div>
        <div class="tabPanel" id="panel-friends">
          <div id="addFriendBar">
            <input type="text" id="addFriendInput" placeholder="Add friend by username">
            <button id="addFriendBtn">Add</button>
          </div>
          <div id="addFriendMsg"></div>
          <div id="friendsList" style="margin-top:6px;"></div>
        </div>
        <div class="tabPanel" id="panel-requests">
          <div style="font-size:10.5px; color:var(--text-faint); text-transform:uppercase; letter-spacing:1px; font-weight:600; padding:8px 10px 2px;">Incoming</div>
          <div id="incomingList"></div>
          <div style="font-size:10.5px; color:var(--text-faint); text-transform:uppercase; letter-spacing:1px; font-weight:600; padding:14px 10px 2px;">Sent</div>
          <div id="outgoingList"></div>
        </div>
      </div>
      <button id="signOutBtn">Sign Out</button>
    </div>

    <div id="chatPane" class="glass">
      <div id="chatHeader">
        <div class="avatar" id="chatAvatar"></div>
        <div class="chInfo">
          <div class="chTitle" id="chatTitle"></div>
          <div class="chStatus">
            <span class="chStatusDot" id="chatStatusDot"></span>
            <span id="chatStatusText"></span>
          </div>
        </div>
      </div>
      <div id="emptyState">
        <div class="big">No conversation selected</div>
        <div>Pick a friend from the sidebar to start chatting.</div>
      </div>
      <div id="messages"></div>
      <div id="composer">
        <input type="text" id="messageInput" placeholder="Type a message...">
        <button id="sendBtn">Send</button>
      </div>
    </div>
  </div>
</div>

<script>
// ============================================================
// CONFIG
// ============================================================
const SUPABASE_URL = "https://okknkixdbjsnqrwlfgzn.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9ra25raXhkYmpzbnFyd2xmZ3puIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI1NzgwNzQsImV4cCI6MjA5ODE1NDA3NH0.L2QDUnez8KjIM8yg9cB9cs-tTq6nedk3CCpuJBjWBEg";

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ---------- Theme ----------
const root = document.documentElement;
function applyTheme(t) {
  root.setAttribute('data-theme', t);
  document.getElementById('themeToggleBtn').textContent = t === 'dark' ? '🌙' : '☀️';
  localStorage.setItem('sinkos-chat-theme', t);
}
applyTheme(localStorage.getItem('sinkos-chat-theme') || 'dark');
document.getElementById('themeToggleBtn').addEventListener('click', () => {
  applyTheme(root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
});

// ---------- State ----------
let currentUser        = null;
let currentProfile     = null;
let conversations      = [];
let friends            = [];
let incomingRequests   = [];
let outgoingRequests   = [];
let onlineUserIds      = new Set();
let activeConversationId = null;
let activeFriendId     = null;
let activeFriendName   = null;
let messageChannel     = null;
let presenceChannel    = null;
let friendReqChannel   = null;

// ---------- DOM ----------
const authScreen     = document.getElementById('authScreen');
const mainScreen     = document.getElementById('mainScreen');
const authEmail      = document.getElementById('authEmail');
const authPassword   = document.getElementById('authPassword');
const authError      = document.getElementById('authError');
const signInBtn      = document.getElementById('signInBtn');
const signOutBtn     = document.getElementById('signOutBtn');
const meLabel        = document.getElementById('meLabel');
const chatHeader     = document.getElementById('chatHeader');
const chatAvatar     = document.getElementById('chatAvatar');
const chatTitle      = document.getElementById('chatTitle');
const chatStatusDot  = document.getElementById('chatStatusDot');
const chatStatusText = document.getElementById('chatStatusText');
const emptyState     = document.getElementById('emptyState');
const messagesEl     = document.getElementById('messages');
const composer       = document.getElementById('composer');
const messageInput   = document.getElementById('messageInput');
const sendBtn        = document.getElementById('sendBtn');
const panelChats     = document.getElementById('panel-chats');
const friendsList    = document.getElementById('friendsList');
const incomingList   = document.getElementById('incomingList');
const outgoingList   = document.getElementById('outgoingList');
const reqBadge       = document.getElementById('reqBadge');
const addFriendInput = document.getElementById('addFriendInput');
const addFriendBtn   = document.getElementById('addFriendBtn');
const addFriendMsg   = document.getElementById('addFriendMsg');

// ---------- Tabs ----------
document.querySelectorAll('.tabBtn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tabBtn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tabPanel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
  });
});

function initials(name) { return (name || '?').slice(0, 2).toUpperCase(); }

function setPresenceUI(friendId) {
  const online = onlineUserIds.has(friendId);
  chatStatusDot.className = 'chStatusDot' + (online ? ' online' : '');
  chatStatusText.textContent = online ? 'Online' : 'Offline';
}

// ---------- Presence ----------
function setupPresence() {
  if (presenceChannel) { sb.removeChannel(presenceChannel); presenceChannel = null; }
  presenceChannel = sb.channel('online-users', {
    config: { presence: { key: currentUser.id } }
  });
  presenceChannel.on('presence', { event: 'sync' }, () => {
    const state = presenceChannel.presenceState();
    onlineUserIds = new Set(Object.keys(state));
    renderFriends();
    renderChats();
    if (activeFriendId) setPresenceUI(activeFriendId);
  });
  presenceChannel.subscribe(async (status) => {
    if (status === 'SUBSCRIBED') {
      await presenceChannel.track({ online_at: new Date().toISOString() });
    }
  });
}

// ---------- Friend request realtime ----------
function setupFriendRequestRealtime() {
  if (friendReqChannel) { sb.removeChannel(friendReqChannel); friendReqChannel = null; }
  friendReqChannel = sb.channel('friend-requests-' + currentUser.id);
  friendReqChannel
    .on('postgres_changes', { event: '*', schema: 'public', table: 'friend_requests', filter: 'receiver_id=eq.' + currentUser.id }, () => loadFriendsAndRequests())
    .on('postgres_changes', { event: '*', schema: 'public', table: 'friend_requests', filter: 'sender_id=eq.' + currentUser.id }, () => loadFriendsAndRequests())
    .subscribe();
}

// ---------- Message realtime ----------
function subscribeToMessages(convId) {
  if (messageChannel) { sb.removeChannel(messageChannel); messageChannel = null; }
  messageChannel = sb.channel('messages-' + convId);
  messageChannel
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, async (payload) => {
      if (payload.new.conversation_id !== convId) return;
      const { data: profile } = await sb.from('profiles').select('username').eq('id', payload.new.sender_id).single();
      renderMessage({ ...payload.new, profiles: profile });
      messagesEl.scrollTop = messagesEl.scrollHeight;
    })
    .subscribe();
}

// ---------- Init ----------
init();

async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) await handleSignedIn(session.user);
  sb.auth.onAuthStateChange((event, session) => {
    if (event === 'SIGNED_IN' && session) handleSignedIn(session.user);
    if (event === 'SIGNED_OUT') handleSignedOut();
  });
}

async function handleSignedIn(user) {
  currentUser = user;
  const { data: profile } = await sb.from('profiles').select('*').eq('id', user.id).single();
  currentProfile = profile;
  meLabel.textContent = profile ? '@' + profile.username : user.email;
  authScreen.style.display = 'none';
  mainScreen.classList.add('active');
  await Promise.all([loadFriendsAndRequests(), loadConversations()]);
  setupPresence();
  setupFriendRequestRealtime();
}

function handleSignedOut() {
  currentUser = null; currentProfile = null;
  conversations = []; friends = []; incomingRequests = []; outgoingRequests = [];
  activeConversationId = null; activeFriendId = null; activeFriendName = null;
  if (presenceChannel)  { sb.removeChannel(presenceChannel);  presenceChannel  = null; }
  if (messageChannel)   { sb.removeChannel(messageChannel);   messageChannel   = null; }
  if (friendReqChannel) { sb.removeChannel(friendReqChannel); friendReqChannel = null; }
  mainScreen.classList.remove('active');
  authScreen.style.display = 'flex';
}

// ---------- Auth ----------
signInBtn.addEventListener('click', async () => {
  authError.textContent = '';
  const email = authEmail.value.trim();
  const password = authPassword.value;
  if (!email || !password) { authError.textContent = 'Enter your email and password.'; return; }
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if (error) authError.textContent = error.message;
});
signOutBtn.addEventListener('click', async () => { await sb.auth.signOut(); });

// ---------- Friends & requests ----------
async function loadFriendsAndRequests() {
  const { data: rows, error } = await sb
    .from('friend_requests')
    .select('*, sender:sender_id(id, username), receiver:receiver_id(id, username)')
    .or('sender_id.eq.' + currentUser.id + ',receiver_id.eq.' + currentUser.id);
  if (error) { console.error('loadFriendsAndRequests error:', error); return; }

  const all = rows || [];
  const seenFriends = new Set();
  friends = [];
  all.filter(r => r.status === 'accepted').forEach(r => {
    const other = r.sender_id === currentUser.id ? r.receiver : r.sender;
    if (other && !seenFriends.has(other.id)) {
      seenFriends.add(other.id);
      friends.push({ requestId: r.id, id: other.id, username: other.username });
    }
  });
  incomingRequests = all.filter(r => r.status === 'pending' && r.receiver_id === currentUser.id)
    .map(r => ({ requestId: r.id, id: r.sender.id, username: r.sender.username }));
  outgoingRequests = all.filter(r => r.status === 'pending' && r.sender_id === currentUser.id)
    .map(r => ({ requestId: r.id, id: r.receiver.id, username: r.receiver.username }));

  renderFriends();
  renderRequests();
}

function renderFriends() {
  friendsList.innerHTML = '';
  if (friends.length === 0) { friendsList.innerHTML = '<div class="rowMuted">No friends yet — add one above.</div>'; return; }
  friends.forEach(f => {
    const online = onlineUserIds.has(f.id);
    const item = document.createElement('div');
    item.className = 'rowItem' + (f.id === activeFriendId ? ' active' : '');
    item.innerHTML = `
      <div class="avatar">${initials(f.username)}<span class="presenceDot ${online ? 'online' : ''}"></span></div>
      <div class="rowText">
        <div class="name">@${f.username}</div>
        <div class="preview">${online ? 'Online' : 'Offline'}</div>
      </div>`;
    item.addEventListener('click', () => openChatWithFriend(f));
    friendsList.appendChild(item);
  });
}

function renderRequests() {
  reqBadge.style.display = incomingRequests.length > 0 ? 'inline-block' : 'none';
  reqBadge.textContent = incomingRequests.length;

  incomingList.innerHTML = '';
  if (incomingRequests.length === 0) {
    incomingList.innerHTML = '<div class="rowMuted">No incoming requests.</div>';
  } else {
    incomingRequests.forEach(r => {
      const item = document.createElement('div');
      item.className = 'rowItem';
      item.innerHTML = `
        <div class="avatar">${initials(r.username)}</div>
        <div class="rowText"><div class="name">@${r.username}</div></div>
        <div class="reqActions">
          <button class="btnAccept">Accept</button>
          <button class="btnDecline">Decline</button>
        </div>`;
      item.querySelector('.btnAccept').addEventListener('click', (e) => { e.stopPropagation(); respondToRequest(r.requestId, 'accepted', r.id); });
      item.querySelector('.btnDecline').addEventListener('click', (e) => { e.stopPropagation(); respondToRequest(r.requestId, 'declined', r.id); });
      incomingList.appendChild(item);
    });
  }

  outgoingList.innerHTML = '';
  if (outgoingRequests.length === 0) {
    outgoingList.innerHTML = '<div class="rowMuted">No sent requests.</div>';
  } else {
    outgoingRequests.forEach(r => {
      const item = document.createElement('div');
      item.className = 'rowItem';
      item.innerHTML = `
        <div class="avatar">${initials(r.username)}</div>
        <div class="rowText"><div class="name">@${r.username}</div></div>
        <div class="pendingTag">Pending</div>`;
      outgoingList.appendChild(item);
    });
  }
}

addFriendBtn.addEventListener('click', sendFriendRequest);
addFriendInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendFriendRequest(); });

async function sendFriendRequest() {
  const username = addFriendInput.value.trim();
  addFriendMsg.className = ''; addFriendMsg.textContent = '';
  if (!username) { addFriendMsg.className = 'error'; addFriendMsg.textContent = 'Enter a username.'; return; }
  const { data: target, error: lookupErr } = await sb.from('profiles').select('id, username').eq('username', username).single();
  if (lookupErr || !target) { addFriendMsg.className = 'error'; addFriendMsg.textContent = 'No user found.'; return; }
  if (target.id === currentUser.id) { addFriendMsg.className = 'error'; addFriendMsg.textContent = "That's you."; return; }
  if (friends.some(f => f.id === target.id)) { addFriendMsg.className = 'error'; addFriendMsg.textContent = 'Already friends.'; return; }
  if (outgoingRequests.some(r => r.id === target.id)) { addFriendMsg.className = 'error'; addFriendMsg.textContent = 'Request already sent.'; return; }
  const { error } = await sb.from('friend_requests').insert({ sender_id: currentUser.id, receiver_id: target.id, status: 'pending' });
  if (error) { addFriendMsg.className = 'error'; addFriendMsg.textContent = error.message; return; }
  addFriendMsg.className = 'success'; addFriendMsg.textContent = 'Request sent!';
  addFriendInput.value = '';
  await loadFriendsAndRequests();
}

async function respondToRequest(requestId, status, otherUserId) {
  const { error } = await sb.from('friend_requests').update({ status, responded_at: new Date().toISOString() }).eq('id', requestId);
  if (error) { alert(error.message); return; }
  if (status === 'accepted') await ensureConversationWith(otherUserId);
  await loadFriendsAndRequests();
  await loadConversations();
}

// ---------- Conversations ----------
async function ensureConversationWith(otherUserId) {
  const existing = conversations.find(c =>
    !c.is_group && (c.otherUser && c.otherUser.id === otherUserId)
  );
  if (existing) return existing.id;

  const { data: newConv, error: convError } = await sb
    .from('conversations').insert({ is_group: false, created_by: currentUser.id }).select().single();
  if (convError) { console.error('create conv error:', convError); return null; }

  const { error: partError } = await sb.from('conversation_participants').insert([
    { conversation_id: newConv.id, user_id: currentUser.id },
    { conversation_id: newConv.id, user_id: otherUserId }
  ]);
  if (partError) { console.error('create participants error:', partError); return null; }
  return newConv.id;
}

async function loadConversations() {
  // Load participant rows for current user
  const { data: parts, error: partsError } = await sb
    .from('conversation_participants')
    .select('conversation_id')
    .eq('user_id', currentUser.id);
  if (partsError) { console.error('parts error:', partsError); return; }
  if (!parts || parts.length === 0) { conversations = []; renderChats(); return; }

  const convIds = parts.map(p => p.conversation_id);

  // Load conversations
  const { data: convs, error: convsError } = await sb
    .from('conversations')
    .select('*')
    .in('id', convIds)
    .order('created_at', { ascending: false });
  if (convsError) { console.error('convs error:', convsError); return; }

  // For each conversation, load the OTHER participant's profile separately
const enriched = await Promise.all((convs || []).map(async (conv) => {
    const { data: allParts } = await sb
      .from('conversation_participants')
      .select('user_id')
      .eq('conversation_id', conv.id);

    const otherPart = (allParts || []).find(p => p.user_id !== currentUser.id);

    if (otherPart) {
      const { data: profile } = await sb
        .from('profiles')
        .select('id, username')
        .eq('id', otherPart.user_id)
        .single();
      return { ...conv, otherUser: profile };
    }
    return { ...conv, otherUser: null };
  }));
  conversations = enriched;
  renderChats();
}

function renderChats() {
  panelChats.innerHTML = '';
  if (conversations.length === 0) { panelChats.innerHTML = '<div class="rowMuted">No chats yet. Add a friend to get started.</div>'; return; }
  conversations.forEach(conv => {
    const other = conv.otherUser;
    const name = other ? '@' + other.username : 'Conversation';
    const online = other ? onlineUserIds.has(other.id) : false;
    const item = document.createElement('div');
    item.className = 'rowItem' + (conv.id === activeConversationId ? ' active' : '');
    item.innerHTML = `
      <div class="avatar">${initials(other ? other.username : '?')}<span class="presenceDot ${online ? 'online' : ''}"></span></div>
      <div class="rowText"><div class="name">${name}</div><div class="preview">${online ? 'Online' : 'Offline'}</div></div>`;
    item.addEventListener('click', () => openConversation(conv.id, other));
    panelChats.appendChild(item);
  });
}

async function openChatWithFriend(friend) {
  await loadConversations();
  const existing = conversations.find(c => c.otherUser && c.otherUser.id === friend.id);
  if (existing) {
    openConversation(existing.id, existing.otherUser);
  } else {
    const convId = await ensureConversationWith(friend.id);
    if (!convId) return;
    await loadConversations();
    openConversation(convId, { id: friend.id, username: friend.username });
  }
}

async function openConversation(convId, other) {
  activeConversationId = convId;
  activeFriendId = other ? other.id : null;
  activeFriendName = other ? other.username : null;
  renderChats(); renderFriends();

  chatHeader.style.display = 'flex';
  chatAvatar.textContent = initials(other ? other.username : '?');
  chatTitle.textContent = other ? '@' + other.username : 'Conversation';
  if (activeFriendId) setPresenceUI(activeFriendId);

  emptyState.style.display = 'none';
  messagesEl.style.display = 'flex';
  composer.style.display = 'flex';

  await loadMessages(convId);
  subscribeToMessages(convId);
}

// ---------- Messages ----------
async function loadMessages(convId) {
  const { data: msgs, error } = await sb
    .from('messages')
    .select('*, profiles(username)')
    .eq('conversation_id', convId)
    .order('created_at', { ascending: true });
  if (error) { console.error('loadMessages error:', error); return; }
  messagesEl.innerHTML = '';
  (msgs || []).forEach(renderMessage);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function renderMessage(msg) {
  const mine = msg.sender_id === currentUser.id;
  const el = document.createElement('div');
  el.className = 'msg ' + (mine ? 'mine' : 'theirs');
  const uname = msg.profiles ? msg.profiles.username : (mine ? currentProfile?.username || 'you' : 'unknown');
  el.innerHTML = `<div class="meta">${uname} · ${new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</div><div></div>`;
  el.querySelector('div:last-child').textContent = msg.content;
  messagesEl.appendChild(el);
}

async function sendMessage() {
  const content = messageInput.value.trim();
  if (!content || !activeConversationId) return;
  sendBtn.disabled = true;
  const { error } = await sb.from('messages').insert({ conversation_id: activeConversationId, sender_id: currentUser.id, content });
  sendBtn.disabled = false;
  if (error) { alert('Failed to send: ' + error.message); return; }
  messageInput.value = '';
}
sendBtn.addEventListener('click', sendMessage);
messageInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMessage(); });
</script>
